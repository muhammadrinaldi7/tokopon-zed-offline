services:
  # Service PHP & Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app_dev
    user: "root"
    volumes:
      - .:/var/www/html
    networks:
      - laravel_network
    depends_on:
      - mysql
      - redis

  # Service Nginx Web Server
  webserver:
    image: nginx:alpine
    container_name: laravel_nginx_dev
    user: "root"
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_network

  # Service Database MySQL 8.0
  mysql:
    image: mysql:8.0
    container_name: laravel_mysql_dev
    restart: always
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel_network

  # Service Redis Cache
  redis:
    image: redis:alpine
    container_name: laravel_redis_dev
    restart: always
    ports:
      - "6379:6379"
    networks:
      - laravel_network

  # Service phpMyAdmin untuk manajemen database
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: laravel_phpmyadmin_dev
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=mysql
      - USER=root
      - PASSWORD=root
    networks:
      - laravel_network
    depends_on:
      - mysql

networks:
  laravel_network:
    driver: bridge

volumes:
  mysql_data:
