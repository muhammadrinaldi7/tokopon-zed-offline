name: Deploy Laravel to Stagging Server

on:
  push:
    branches:
      - stagging_prod

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer Dependencies (with dev)
        run: composer install --no-interaction --optimize-autoloader

      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Generate APP_KEY
        run: php artisan key:generate

    #   - name: Run PHPUnit tests
    #     run: vendor/bin/phpunit

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3

      # 2.5 Cache Composer Dependencies
      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      # 3. Install Laravel Dependencies
      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      # 3.5 Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      # 3.6 Cache NPM dependencies
      - name: Cache NPM dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      # 3.7 Install Node dependencies
      - name: Install Node dependencies
        run: npm install

      # 3.8 Build assets for production
      - name: Build assets
        run: npm run build

      # 4. Upload Laravel Core ke root hosting via FTP
      - name: Upload Laravel Core to Hosting Root
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER_STAGGING }}
          username: ${{ secrets.FTP_USERNAME_STAGGING }}
          password: ${{ secrets.FTP_PASSWORD_STAGGING }}
          local-dir: ./
          server-dir: /laravel/
          exclude: |
            node_modules/*
            node_modules
            node_modules/**
            vendor/**
            vendor/
            vendor
            .git*
            .git/*
            .git/**
            .github/**
            .github/*
            .github/
            test/*
            test
            test/**
            README.md
            vite.config.js
            package.json
            package-lock.json
            webpack.mix.js

 # --- JOB BARU: DEPLOY KE VPS ---
  # --- JOB BARU: DEPLOY KE VPS VIA FTP ---
  deploy_vps:
    needs: deploy-docker # Menunggu deploy staging web hosting selesai
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Mengambil kode terbaru dari GitHub
        uses: actions/checkout@v4

      # (Opsional) Tambahkan proses build di sini jika diperlukan
      # Contoh: npm install && npm run build
      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3

      # 2.5 Cache Composer Dependencies
      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      # 3. Install Laravel Dependencies
      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      # 3.5 Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      # 3.6 Cache NPM dependencies
      - name: Cache NPM dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      # 3.7 Install Node dependencies
      - name: Install Node dependencies
        run: npm install

      # 3.8 Build assets for production
      - name: Build assets
        run: npm run build

      # 4. ZIP File sebelum di-transfer (PENTING untuk Laravel)
      # Mengecualikan folder node_modules dan .git karena tidak dibutuhkan di server production
      - name: Compress files
        run: zip -q -r deploy.zip . -x "node_modules/*" ".git/*" "tests/*"

      - name: 📂 Mentransfer file ke CloudPanel (via SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          # Path sumber (semua file di repository)
          source: "./"
          # Path tujuan di CloudPanel (SESUAIKAN DENGAN NAMA DOMAINMU!)
          target: "/home/${{ secrets.VPS_USERNAME }}/htdocs/pos.zedgroup.tech/"
          # Mencegah folder root tambahan ikut ter-copy
          strip_components: 1

      - name: ⚙️ Menjalankan perintah post-deploy di server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          # Jalankan perintah tambahan (misal restart layanan atau clear cache)
          script: |
            cd /home/${{ secrets.VPS_USERNAME }}/htdocs/pos.zedgroup.tech/
            unzip -q -o deploy.zip
            rm deploy.zip
            
            # Hubungkan folder storage
            php artisan storage:link
            
            # Bersihkan cache lama (termasuk view dari Livewire SFC jika ada pembaruan)
            php artisan optimize:clear
            
            # Buat cache baru untuk production
            php artisan config:cache
            php artisan event:cache
            php artisan route:cache
            php artisan view:cache

  deploy-docker:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      # Step 1: Ambil kode dari repository GitHub
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Login ke Docker Hub agar bisa upload image
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_ED }}
          password: ${{ secrets.DOCKERHUB_TOKEN_ED }}

      # Step 3: Build dan Push Image ke Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: nidzaredwan/laravel-app:latest

      # Step 4: PURE SSH ACTION (Menulis Config dan .env Langsung di VPS via Terminal)
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST_ED }}
          username: ${{ secrets.VPS_USERNAME_ED }}
          key: ${{ secrets.VPS_SSH_KEY_ED }}
          script: |
            # 1. Pastikan semua folder utama terbuat di VPS
            mkdir -p /var/www/laravel-prod/docker/nginx

            # 2. Tulis otomatis isi file .env khusus production langsung dari robot
            cat << 'EOF' > /var/www/laravel-prod/.env
            APP_NAME=ZEDPOS
            APP_ENV=production
            APP_KEY=base64:uq6vYmZ7vXz8Vp9B6mK7vXz8Vp9B6mK7vXz8Vp9B6mK=
            APP_DEBUG=false
            APP_URL=https://zedstaging.cloud

            DB_CONNECTION=mysql
            DB_HOST=mysql
            DB_PORT=3306
            DB_DATABASE=laravel_db
            DB_USERNAME=root
            DB_PASSWORD=password123!

            CACHE_STORE=file
            QUEUE_CONNECTION=sync
            SESSION_DRIVER=file
            SESSION_LIFETIME=120
            EOF

            # 3. Inject otomatis isi file docker-compose.prod.yml dengan Volume Asset Sharing
            cat << 'EOF' > /var/www/laravel-prod/docker-compose.prod.yml
            services:
              app:
                image: nidzaredwan/laravel-app:latest
                container_name: laravel_app_prod
                restart: always
                env_file:
                  - .env
                volumes:
                  - laravel_storage:/var/www/html/storage
                  - laravel_public_assets:/var/www/html/public
                networks:
                  - production_network
                depends_on:
                  - mysql

              webserver:
                image: nginx:alpine
                container_name: laravel_nginx_prod
                restart: always
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf
                  - laravel_public_assets:/var/www/html/public
                  - /etc/letsencrypt:/etc/letsencrypt:ro
                networks:
                  - production_network
                depends_on:
                  - app
                  - mysql

              mysql:
                image: mysql:8.0
                container_name: laravel_mysql_prod
                restart: always
                env_file:
                  - .env
                environment:
                  - MYSQL_ROOT_PASSWORD=password123!
                  - MYSQL_DATABASE=laravel_db
                volumes:
                  - mysql_production_data:/var/lib/mysql
                networks:
                  - production_network

              phpmyadmin:
                image: phpmyadmin:latest
                container_name: laravel_phpmyadmin_prod
                restart: always
                ports:
                  - "8080:80"
                environment:
                  - PMA_HOST=mysql
                  - UPLOAD_LIMIT=500M
                networks:
                  - production_network
                depends_on:
                  - mysql

            networks:
              production_network:
                driver: bridge

            volumes:
              mysql_production_data:
              laravel_storage:
              laravel_public_assets:
            EOF

            # 4. Inject otomatis isi file production.conf (Nginx Proxy)
            cat << 'EOF' > /var/www/laravel-prod/docker/nginx/production.conf
            server {
                listen 80;
                listen [::]:80;
                server_name zedstaging.cloud www.zedstaging.cloud;

                # Folder untuk verifikasi Let's Encrypt otomatis
                location /.well-known/acme-challenge/ {
                    root /var/www/html/public;
                }

                # Redirect semua traffic HTTP biasa ke HTTPS aman
                location / {
                    return 301 https://$host$request_uri;
                }
            }

            server {
                listen 443 ssl;
                listen [::]:443 ssl;
                server_name zedstaging.cloud www.zedstaging.cloud;

                index index.php index.html;
                root /var/www/html/public;
                charset utf-8;

                # Lokasi sertifikat SSL di dalam container Nginx
                ssl_certificate /etc/letsencrypt/live/zedstaging.cloud/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/zedstaging.cloud/privkey.pem;

                location / {
                    try_files $uri $uri/ /index.php?$query_string;
                }

                location = /favicon.ico { access_log off; log_not_found off; }
                location = /robots.txt  { access_log off; log_not_found off; }

                location ~ \.php$ {
                    fastcgi_pass app:9000;
                    fastcgi_index index.php;
                    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                    include fastcgi_params;
                }

                location ~ /\.(?!well-known).* {
                    deny all;
                }
            }
            EOF

            # 5. Masuk ke folder utama aplikasi di VPS
            cd /var/www/laravel-prod

            # 6. Tarik image matang ZEDPOS terbaru dari Docker Hub
            docker pull nidzaredwan/laravel-app:latest

            # 7. Jalankan ulang container. Docker hanya akan me-recreate container yang image atau konfigurasinya berubah (minimal downtime)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # 9. Jalankan ritual wajib pembersihan cache dan migrasi otomatis
            docker exec -i laravel_app_prod php artisan optimize:clear
            docker exec -i laravel_app_prod php artisan optimize


 